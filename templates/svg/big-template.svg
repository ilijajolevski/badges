<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
        xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
        xmlns:svg="http://www.w3.org/2000/svg"
        xmlns="http://www.w3.org/2000/svg"
        id="Layer_1"
        viewBox="0 0 170 199.99999"
        version="1.1"
        width="170"
        height="200">
  <defs
          id="defs896">
    <style id="style889">
      <!-- .cls-1 fill for GEANT logo, default #ffffff -->
      .cls-1{fill:{{.LogoColor}};}
      <!-- .cls-2 background color, default #0e3f5f -->
      .cls-2{fill:{{.BackgroundColor}};}
      <!-- .cls-3 horizontal bars color, default #e78a2d -->
      .cls-3{fill:{{.HorizontalBarsColor}};}
      <!-- .cls-4 top label color both lines, default #e78a2d -->
      .cls-4{fill:{{.TopLabelColor}};font-family:Verdana,sans-serif;font-size:14px;font-weight:600;}
      <!-- .cls-5 top label color both lines, default #e78a2d -->
      .cls-5{fill:url(#linear-gradient);}
      <!-- .cls-6 border color, default #e78a2d -->
      .cls-6{fill:{{.BorderColor}};}
      <!-- .cls-7 cert name label color, all 3 lines, default #fff -->
      .cls-7{fill:{{.CertNameColor}};font-family:Verdana,sans-serif;font-size:16px;font-weight:600;}
    </style>
    <linearGradient
            id="linear-gradient"
            x1="71.209999"
            y1="27.66"
            x2="109.51"
            y2="39.759998"
            gradientTransform="matrix(1,0,0,-1,0,202)"
            gradientUnits="userSpaceOnUse">
      <stop
              offset="1"
              stop-color="{{.GradientStartColor}}"
              id="stop891" />
      <stop
              offset="1"
              stop-color="{{.GradientEndColor}}"
              id="stop893" />
    </linearGradient>
  </defs>
  <rect
          class="cls-6"
          width="170"
          height="200"
          id="rect898"
          x="0"
          y="0" />
  <polygon
          class="cls-2"
          points="164.81,44 165.31,193.5 6.3,193.15 6.3,5.89 124,5.89 "
          id="polygon900" />
  <rect
          class="cls-3"
          x="21.110001"
          y="67"
          width="131.83"
          height="3.0"
          rx="1.5"
          ry="1.5"
          id="rect902" />
  <rect
          class="cls-3"
          x="19.879999"
          y="142.56"
          width="131.83"
          height="3.0"
          rx="1.5"
          ry="1.5"
          id="rect904" />

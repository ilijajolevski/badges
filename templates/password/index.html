<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    .card { background: var(--card-bg, #fff); border-radius: 10px; box-shadow: var(--shadow-elev-1, 0 2px 8px rgba(0,0,0,0.08)); padding: 24px; margin-top: 16px; max-width: 520px; margin-left: auto; margin-right: auto; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-weight: 600; margin-bottom: 6px; }
    .form-row input { width: 100%; padding: 10px; border: 1px solid #d0d5dd; border-radius: 6px; }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; border: 0; cursor: pointer; }
    .btn-primary { background: var(--primary-color); color: #fff; }
    .btn-primary:hover { background: var(--secondary-color); }
    .actions { display: flex; gap: 8px; align-items: center; }
    .error { color: #b42318; margin-top: 8px; }
    .success { color: #027a48; margin-top: 8px; }
    .hint { color: #667085; font-size: 0.85rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/"><img src="/static/geant-logo-stacked.svg?v=2" alt="GÉANT Logo" class="header-logo"></a>
      <h1>Change Password</h1>
    </header>

    <main>
      <section class="card">
        <h2>Change your password</h2>
        <div class="form-row">
          <label for="oldPassword">Current password</label>
          <input id="oldPassword" type="password" autocomplete="current-password" />
        </div>
        <div class="form-row">
          <label for="newPassword">New password</label>
          <input id="newPassword" type="password" autocomplete="new-password" />
          <div class="hint">At least 8 characters with uppercase, lowercase, a number and a special character.</div>
        </div>
        <div class="form-row">
          <label for="confirmPassword">Confirm new password</label>
          <input id="confirmPassword" type="password" autocomplete="new-password" />
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="changeBtn">Update password</button>
          <span id="changeMsg" aria-live="polite"></span>
        </div>
      </section>
    </main>

    <footer>
      <div>
        The GÉANT project is funded by the Horizon Europe research and innovation programme.
        <img src="/static/co-Funded_logo_white.png" alt="Co-funded by the European Union" class="cofunded-logo">
      </div>
      <span class="version-label">v{{.Version}} ({{.Commit}})</span>
    </footer>
  </div>

  <script>
    document.getElementById('changeBtn').addEventListener('click', async () => {
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('changeMsg');
      msg.textContent = '';
      msg.className = '';

      if (!oldPassword || !newPassword) {
        msg.textContent = 'Please fill in all fields.';
        msg.className = 'error';
        return;
      }
      if (newPassword !== confirmPassword) {
        msg.textContent = 'New password and confirmation do not match.';
        msg.className = 'error';
        return;
      }

      try {
        const res = await fetch('/api/auth/password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ old_password: oldPassword, new_password: newPassword }),
          credentials: 'same-origin'
        });

        if (res.ok) {
          msg.textContent = 'Password updated successfully.';
          msg.className = 'success';
          document.getElementById('oldPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
        } else {
          let friendly = 'Could not change password';
          try {
            const ct = res.headers.get('Content-Type') || '';
            if (ct.includes('application/json')) {
              const data = await res.json();
              friendly = data.error || data.message || friendly;
            } else if (res.status === 401) {
              friendly = 'Current password is incorrect';
            } else {
              await res.text();
            }
          } catch (_) {}
          msg.textContent = friendly;
          msg.className = 'error';
        }
      } catch (e) {
        msg.textContent = 'Network error';
        msg.className = 'error';
      }
    });
  </script>
  <script src="/static/js/admin-nav.js" defer></script>
</body>
</html>
